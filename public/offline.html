<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - Quokka Flash Pal</title>
    <style>
      :root {
        --bg: #020617;
        --panel: #0f172a;
        --text-main: #e2e8f0;
        --text-sub: #94a3b8;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text-main);
        font-family: 'Trebuchet MS', 'Malgun Gothic', 'Segoe UI', sans-serif;
      }
      .card {
        width: min(480px, 90vw);
        border: 1px solid #334155;
        background: var(--panel);
        border-radius: 14px;
        padding: 1rem;
        text-align: center;
      }
      p {
        color: var(--text-sub);
      }
      a {
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>현재 오프라인입니다</h1>
      <p>네트워크가 없어 서버 동기화가 불가한 상태입니다. 네트워크가 회복되면 자동으로 다시 연결됩니다.</p>
      <a href="/">메인으로 돌아가기</a>
    </div>
  </body>
</html>
