<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuokkaWords - 쿼카와 함께하는 영단어</title>
    <meta name="description" content="귀여운 쿼카와 함께 영어 단어를 재미있게 외우세요!" />
    <meta property="og:title" content="QuokkaWords" />
    <meta property="og:description" content="쿼카와 함께하는 영단어 학습" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Toast -->
      <div id="toast-container"></div>
      <!-- Confetti -->
      <canvas id="confetti-canvas"></canvas>

      <!-- ===== SCREEN: Child Info ===== -->
      <section id="screen-child-info" class="screen active">
        <div class="deck-screen-inner">
          <div class="mascot-area" id="mascot-main"></div>
          <div class="speech-bubble" id="speech-child-info">반가워! 이름이 뭐야?</div>
          <h1 class="deck-screen-title">아이 정보 입력</h1>
          <form id="child-info-form" class="add-word-form" style="text-align:left">
            <h3>우리 아이 정보</h3>
            <input class="form-input" id="child-name" placeholder="이름 *" required />
            <select class="form-select" id="child-level">
              <option value="beginner">초급 (유아~초등 저학년)</option>
              <option value="elementary" selected>초등 (초등 고학년)</option>
              <option value="intermediate">중급 (중학생 이상)</option>
            </select>
            <button type="submit" class="primary-btn" style="width:100%;margin-top:8px">시작하기!</button>
          </form>
          <p style="margin-top:16px;font-size:.82rem;color:var(--text-light)">이미 사용한 적 있나요? 정보는 브라우저에 저장됩니다.</p>
        </div>
      </section>

      <!-- ===== SCREEN: Deck Selection ===== -->
      <section id="screen-deck" class="screen">
        <div class="deck-screen-inner">
          <div class="mascot-area" id="mascot-deck"></div>
          <div class="speech-bubble" id="speech-deck">오늘도 한 단어씩!</div>
          <h1 class="deck-screen-title" id="deck-greeting">어떤 덱을 공부할까?</h1>
          <div class="deck-grid" id="deck-grid"></div>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
            <button class="secondary-btn" id="goto-admin">단어 관리</button>
            <button class="secondary-btn" id="goto-report">부모 리포트</button>
          </div>
        </div>
      </section>

      <!-- ===== SCREEN: Flashcard Study (캐릭터 수업) ===== -->
      <section id="screen-study" class="screen">
        <div class="study-screen-inner">
          <header class="study-header">
            <button id="back-to-decks" class="icon-btn">← 덱 목록</button>
            <span id="deck-title" class="deck-label"></span>
            <div class="streak-counter" id="streak-counter">🔥 0</div>
          </header>

          <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
          <span class="progress-text" id="progress-text">0 / 0</span>

          <div class="filter-row">
            <input type="text" class="search-input" id="search-input" placeholder="검색 (영어/한국어)..." />
            <div class="filter-toggles">
              <button class="filter-btn active" data-filter="all">전체</button>
              <button class="filter-btn" data-filter="unknown">모르는 단어</button>
              <button class="filter-btn" data-filter="memorized">외운 단어</button>
            </div>
          </div>

          <div class="flashcard-container">
            <div class="flashcard" id="flashcard">
              <div class="flashcard-inner" id="flashcard-inner">
                <div class="flashcard-front">
                  <p class="card-english" id="card-english"></p>
                  <p class="card-tap-hint">탭하거나 Space를 누르세요 🇰🇷</p>
                </div>
                <div class="flashcard-back">
                  <p class="card-korean-meaning" id="card-korean-meaning"></p>
                  <p class="card-korean-explanation" id="card-korean-explanation"></p>
                  <p class="card-example" id="card-example"></p>
                  <p class="card-example-korean" id="card-example-korean"></p>
                </div>
              </div>
            </div>
          </div>

          <div class="quokka-reaction" id="quokka-reaction">
            <span id="reaction-mascot"></span>
            <span class="reaction-bubble" id="reaction-bubble"></span>
          </div>

          <div class="study-actions">
            <button id="btn-prev" class="nav-btn">◀ 이전</button>
            <button id="btn-random" class="nav-btn">🎲 랜덤</button>
            <button id="btn-next" class="nav-btn">다음 ▶</button>
          </div>
          <div class="memorize-actions">
            <button id="btn-unknown" class="action-btn unknown-btn">모르겠어 😅</button>
            <button id="btn-memorized" class="action-btn memorized-btn">외웠어! 🎉</button>
          </div>
          <div style="text-align:center;margin-top:16px">
            <button id="goto-game" class="primary-btn">게임 학습으로 →</button>
          </div>
        </div>
      </section>

      <!-- ===== SCREEN: Game (게임 학습) ===== -->
      <section id="screen-game" class="screen">
        <div class="study-screen-inner">
          <header class="study-header">
            <button id="back-to-study" class="icon-btn">← 수업으로</button>
            <span class="deck-label" id="game-deck-title">게임 학습</span>
            <div class="streak-counter" id="game-score">0 / 0</div>
          </header>

          <div class="progress-bar-container">
            <div class="progress-bar" id="game-progress-bar"></div>
          </div>
          <span class="progress-text" id="game-progress-text">0 / 0</span>

          <div id="game-area" style="min-height:300px">
            <!-- Quiz content rendered by JS -->
          </div>

          <div class="quokka-reaction" id="game-reaction">
            <span id="game-reaction-mascot"></span>
            <span class="reaction-bubble" id="game-reaction-bubble"></span>
          </div>

          <div id="game-complete" style="display:none;text-align:center;padding:40px 20px">
            <div class="mascot-area" id="mascot-game-complete"></div>
            <h2 style="margin:16px 0 8px">게임 완료!</h2>
            <p id="game-result-text" style="font-size:1.1rem;margin-bottom:20px"></p>
            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
              <button id="game-retry" class="primary-btn">다시 하기</button>
              <button id="game-to-report" class="secondary-btn">부모 리포트</button>
              <button id="game-to-decks" class="secondary-btn">덱 목록</button>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== SCREEN: Parent Report (부모 리포트) ===== -->
      <section id="screen-report" class="screen">
        <div class="study-screen-inner">
          <header class="admin-header">
            <button id="back-to-decks-report" class="icon-btn">← 덱 목록</button>
            <h2>부모 리포트</h2>
          </header>

          <div class="add-word-form" id="report-child-info">
            <h3 id="report-child-name">아이 이름</h3>
            <p id="report-child-level" style="font-size:.85rem;color:var(--text-medium)"></p>
          </div>

          <div class="add-word-form" style="margin-top:16px">
            <h3>전체 학습 현황</h3>
            <div id="report-summary" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px"></div>
          </div>

          <div class="add-word-form" style="margin-top:16px">
            <h3>덱별 현황</h3>
            <div id="report-decks"></div>
          </div>

          <div class="add-word-form" style="margin-top:16px">
            <h3>최근 게임 기록</h3>
            <div id="report-games"></div>
          </div>
        </div>
      </section>

      <!-- ===== SCREEN: Admin ===== -->
      <section id="screen-admin" class="screen">
        <div class="admin-screen-inner">
          <header class="admin-header">
            <button id="back-to-decks-admin" class="icon-btn">← 덱 목록</button>
            <h2>단어 관리</h2>
          </header>

          <form id="add-word-form" class="add-word-form">
            <h3>단어 추가</h3>
            <select class="form-select" id="admin-deck-select"></select>
            <input class="form-input" id="input-english" placeholder="English *" required />
            <input class="form-input" id="input-korean-meaning" placeholder="한국어 뜻 *" required />
            <input class="form-input" id="input-korean-explanation" placeholder="한국어 설명 (선택)" />
            <input class="form-input" id="input-example" placeholder="예문 영어 (선택)" />
            <input class="form-input" id="input-example-korean" placeholder="예문 한국어 (선택)" />
            <button type="submit" class="primary-btn" style="width:100%">단어 추가</button>
          </form>

          <div class="csv-section">
            <h3>CSV 일괄 등록</h3>
            <p style="font-size:.8rem;color:var(--text-light);margin-bottom:8px">형식: english,koreanMeaning</p>
            <textarea class="form-textarea" id="csv-input" placeholder="abandon,버리다&#10;abundant,풍부한&#10;..."></textarea>
            <button id="csv-import-btn" class="secondary-btn" style="width:100%;margin-top:10px">CSV 가져오기</button>
          </div>

          <div class="admin-card-list-section">
            <h3 class="admin-card-list-title" id="admin-list-title">단어 목록</h3>
            <div id="admin-card-list"></div>
          </div>
        </div>
      </section>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
